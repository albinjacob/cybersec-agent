# Vulnerable: hardcoded credential in a plain env var instead of a Secret ref -
# a realistic anti-pattern (K8s manifests checked into git with secrets baked in).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky
  template:
    metadata:
      labels:
        app: leaky
    spec:
      containers:
        - name: app
          image: myapp:1.0
          env:
            - name: DATABASE_PASSWORD
              value: "SuperSecretPassw0rd!"
            - name: API_KEY
              value: "sk-fixture-not-a-real-key-0000000000"
